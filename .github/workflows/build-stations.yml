name: Build Stations JSON

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Radio validation probes hundreds of streams; allow headroom for slow networks
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build stations.json
        working-directory: station-builder
        run: node build.js

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: station-builder/output
          branch: gh-pages
          clean: false
          commit-message: 'chore: update stations.json [skip ci]'
